<ng-content>
    <div class="custom-select" (clickOutside)="closeDropdown()">

        <div class="input-label">{{ label }}</div>

        <div class="input-box" [class.error]="hasError" (click)="toggleDropdown()">
            <p class="placeholder" [class.selected]="selectedLabel">
                {{ selectedLabel || placeholder }}
            </p>
            <button type="button" class="action-icon">
                <img [src]="isOpen ? 'assets/icons/icons8-collapse-arrow-64.png' : 'assets/icons/icons8-expand-arrow-64.png'"
                    alt="down-arrow" class="action-icon-img" />
            </button>
        </div>


        @if (isOpen) {
        <ul class="custom-options">
            @for (option of options; track option.value) {
            <li (click)="selectOption(option)" [class.selected]="option.value === value">
                {{ option.label }}
            </li>
            }
        </ul>
        }


        @if (hasError) {
        <p class="error-message">{{errorMessage}}</p>
        }

    </div>
