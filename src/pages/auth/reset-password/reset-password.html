<div class="reset-password-container">
    <article class="reset-password-content">

        <form class="reset-password-form" [formGroup]="resetPasswordForm" (ngSubmit)="submitForm()">
            <div class="reset-password-form-header">
                <div class="reset-password-logo-wrapper">
                    <a routerLink="/">
                        <img src="assets/images/output-onlinepngtools.png" alt="logo" class="reset-password-logo-img">
                    </a>
                </div>
                <h1>Reset your password?</h1>
            </div>

            <div class="reset-password-form-inputs">

                <app-password-input label="New Password" name="newPassword" placeholder="Enter your new password"
                    type="password" [formGroup]="resetPasswordForm" [hasError]="hasError('newPassword')"
                    [errorMessage]="errorMessage('newPassword')" />

                <app-password-input label="Confirm New Password" name="confirmNewPassword"
                    placeholder="Confirm your new password" type="password" [formGroup]="resetPasswordForm"
                    [hasError]="hasError('confirmNewPassword')" [errorMessage]="errorMessage('confirmNewPassword')" />


            </div>

            <div class="reset-password-form-actions">
                <app-button type="submit" [fullWidth]="true" [disabled]="resetPasswordForm.invalid">Change
                    Password</app-button>
            </div>
        </form>
    </article>
</div>
