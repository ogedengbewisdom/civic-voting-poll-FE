<div class="forgot-password-container">
    <article class="forgot-password-content">

        <form class="forgot-password-form" [formGroup]="forgotPasswordForm" (ngSubmit)="submitForm()">
            <div class="forgot-password-form-header">
                <div class="forgot-password-logo-wrapper">
                    <a routerLink="/">
                        <img src="assets/images/output-onlinepngtools.png" alt="logo" class="forgot-password-logo-img">
                    </a>
                </div>
                <h1>Forgot your password?</h1>
            </div>

            <div class="forgot-password-form-inputs">

                <app-text-input label="Email" name="email" placeholder="Enter your email" type="email"
                    [formGroup]="forgotPasswordForm" [hasError]="hasError('email')"
                    [errorMessage]="errorMessage('email')" />

                <div class="links-wrapper">
                    <a routerLink="/auth/login">Remember your password? Login</a>
                </div>
            </div>

            <div class="forgot-password-form-actions">
                <app-button type="submit" [fullWidth]="true"
                    [disabled]="forgotPasswordForm.invalid || !!(loading$ | async)">Reset
                    Password</app-button>
            </div>
        </form>
    </article>
</div>
